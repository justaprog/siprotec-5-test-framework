server {
    listen 80;
    server_name youroctopus.com www.youroctopus.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name youroctopus.com www.youroctopus.com;

    client_max_body_size 10m;

    ssl_certificate /etc/letsencrypt/live/youroctopus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/youroctopus.com/privkey.pem;

    location /api/ {
        proxy_pass http://testmanagement:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
